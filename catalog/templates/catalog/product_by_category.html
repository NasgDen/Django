{% extends 'base.html' %}

{% block title %}Главная страница{% endblock %}

{% block content %}

<div class="row">
    <h3>Категория: {{ category.name }}</h3>
    {% for product in products %}
    <div class="col-sm-4 mb-5">
        <div class="card">
            <div class="card-header">
                <a class="text-decoration-none" href="product/{{product.pk}}">
                    <h4 class="my-0 font-weight-normal ">{{product.name}}</h4>
                </a>
            </div>
            <div class="card-body">
                <div style="width: 250px;">
                    <img class="img-fluid" style="" src="{{product.image.url}}" alt="{{product.name}}">
                </div>
                <h5 class="card-title">{{product.name}}</h5>
                <p class="card-text">{{product.description|truncatechars:100}}</p>
                <h1 class="card-title pricing-card-title">{{product.price}}</h1>
                <a href="{% url 'catalog:product_detail' product.pk %}" class="btn btn-primary">Подробнее</a>
            </div>
        </div>
    </div>
    {% endfor%}
</div>


{% endblock%}
