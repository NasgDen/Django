<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Информация о продукте</title>
</head>
<body>
    <p>Наименование: {{product.name}}</p>
    <p>Описание: {{product.description}}</p>
    <p>Категория: {{product.category}}</p>
    <p>Цена: {{product.price}}</p>
    <p>Дата создания: {{product.created_at | date:"d M Y"}} </p>
    <p>Дата изменения: {{product.created_ut}}</p>
</body>
</html>
