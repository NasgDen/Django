{% extends 'base.html' %}

{% block title %}Главная страница{% endblock %}

{% block content %}

<h>БЛОГИ</h>
{% for blog in blogs %}
<div class="card mb-3" style="max-width: 1000px;">
    <div class="row g-0">
        <div class="col-md-4">
            <img src="{{blog.image.url}}" class="img-fluid rounded-start" alt="{{blog.name}}">
        </div>
        <div class="col-md-8">
            <div class="card-body">
                <h5 class="card-title">{{blog.name}}</h5>
                <p class="card-text">{{blog.content | truncatechars:100}}</p>
                <p class="card-text"><small class="text-body-secondary">Создано {{blog.created_at | date:"d M Y"}}</small></p>
                <a href="blog_detail/{{blog.pk}}" class="btn btn-primary">Подробнее</a>
            </div>
        </div>
    </div>
</div>
{% endfor %}
{% endblock %}
