{% extends 'base.html' %}

{% block title %}Удаление {{blog.name}}{% endblock %}

{% block content %}

<div class="container">
  <form method="post" enctype="multipart/form-data">
    <p>Вы действительно хотите удалить блог {{blog.name}}?</p>
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'blogs:blogs' %}" class="btn btn-secondary">Отмена</a>
  </form>
</div>

{% endblock %}
